<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowBoard — Demo</title>
<style>
  html, body { height: 100%; margin: 0; background: #eef1f5; }
  #app { position: fixed; inset: 0; }
  .gh-link {
    position: fixed; left: 12px; bottom: 12px; z-index: 200;
    font-family: system-ui, sans-serif; font-size: 12px; color: #2f6fd6;
    background: rgba(255,255,255,.9); border: 1px solid #d1d9e3; border-radius: 8px;
    padding: 5px 10px; text-decoration: none;
  }
  @media (prefers-color-scheme: dark) { .gh-link { background: rgba(20,27,37,.9); border-color: #2a3547; color: #6aa2f0; } }
</style>
</head>
<body>
<div id="app"></div>
<a class="gh-link" href="https://github.com/PalmarHealer/flowboard" target="_blank" rel="noopener">github.com/PalmarHealer/flowboard ↗</a>

<!-- one script loads everything (CSS is auto-injected) -->
<script src="./dist/flowboard.auto.js"></script>
<script>
  // defaults: light theme + read-only (presentation). Click "Edit" (top-left) to edit.
  const board = new FlowBoard('#app');

  const COL = 360, ROW = 200;
  const at = (c, r) => ({ x: 60 + c * COL, y: 60 + r * ROW });

  board.setNodes([
    { id: 'banner', ...at(0, 0), width: 520, variant: 'banner', tag: 'FlowBoard',
      title: 'A whiteboard in pure vanilla JS',
      body: '<p style="margin:0;color:var(--fb-muted);font-size:13px">Move, connect and edit cards. Pan/zoom, undo/redo, snap, themes — no dependencies.</p>' },
    { id: 'a', ...at(0, 1), width: 250, variant: 'accent', tag: 'Step 1', title: 'Click Edit, then a card',
      body: 'In edit mode a click opens the <b>rich-text editor</b> (bold / italic / lists / heading).' },
    { id: 'b', ...at(1, 1), width: 250, variant: 'accent', tag: 'Step 2', title: 'Connect',
      body: 'Drag a port on the edge → drop on a card, or on empty space to spawn a linked card.' },
    { id: 'c', ...at(2, 1), width: 250, variant: 'safe', title: 'Restyle',
      body: 'Select a card or connection → the inspector (top-right): colors (hex picker), border, width, style.' },
    { id: 'd', ...at(1, 2), width: 250, variant: 'muted', title: 'Shift + drag',
      body: 'draws a marquee to select several cards and edit them together.' }
  ]);
  board.setEdges([
    { from: 'banner', to: 'a', dir: 'v', arrow: true },
    { from: 'a', to: 'b', dir: 'h', arrow: true, label: 'then' },
    { from: 'b', to: 'c', dir: 'h', arrow: true },
    { from: 'b', to: 'd', dir: 'v', arrow: true, style: 'dashed' }
  ]);
  board.fit();
</script>
</body>
</html>
