<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowBoard — Demo</title>
<style>
  html, body { height: 100%; margin: 0; background: #0b0f15; }
  #app { position: fixed; inset: 0; }
  .demo-actions {
    position: fixed; top: 12px; left: 12px; z-index: 200;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    background: rgba(255,255,255,.92); border: 1px solid #d1d9e3; border-radius: 10px;
    padding: 7px 11px; font-family: system-ui, sans-serif; font-size: 13px;
    box-shadow: 0 6px 20px rgba(0,0,0,.15); backdrop-filter: blur(4px);
  }
  .demo-actions strong { color: #0e141b; }
  .demo-actions a { color: #2f6fd6; text-decoration: none; }
  .demo-actions button {
    font: inherit; font-size: 12px; border: 1px solid #d1d9e3; background: #f2f5f9; color: #1d2530;
    border-radius: 7px; padding: 5px 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  }
  .demo-actions button:hover { border-color: #2f6fd6; color: #2f6fd6; }
  .demo-actions button .fb-i { width: 15px; height: 15px; }
  .demo-actions #status { font-family: ui-monospace, monospace; font-size: 11px; color: #5a6675; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) .demo-actions { background: rgba(20,27,37,.92); border-color: #2a3547; }
    :root:not([data-theme]) .demo-actions strong { color: #e7edf5; }
    :root:not([data-theme]) .demo-actions button { background: #1a222e; border-color: #2a3547; color: #dbe3ee; }
    :root:not([data-theme]) .demo-actions #status { color: #93a1b3; }
  }
  :root[data-theme="dark"] .demo-actions { background: rgba(20,27,37,.92); border-color: #2a3547; }
  :root[data-theme="dark"] .demo-actions strong { color: #e7edf5; }
  :root[data-theme="dark"] .demo-actions button { background: #1a222e; border-color: #2a3547; color: #dbe3ee; }
  :root[data-theme="dark"] .demo-actions #status { color: #93a1b3; }
</style>
</head>
<body>
<div id="app"></div>
<div class="demo-actions">
  <strong>FlowBoard</strong>
  <button id="add" type="button"></button>
  <button id="ro" type="button"></button>
  <button id="save" type="button"></button>
  <a href="https://github.com/PalmarHealer/flowboard" target="_blank" rel="noopener">GitHub ↗</a>
  <span id="status">ready</span>
</div>

<!-- one script loads everything (CSS is auto-injected) -->
<script src="./dist/flowboard.auto.js"></script>
<script>
(function () {
  var CDN = 'https://cdn.jsdelivr.net/gh/PalmarHealer/flowboard@v1.0.0/dist/flowboard.auto.js';

  var nodes = [
    { id: 'banner', x: 40, y: 30, width: 520, variant: 'banner', tag: 'FlowBoard',
      title: 'A whiteboard in pure vanilla JS',
      body: '<p style="margin:0;color:var(--fb-muted);font-size:13px">Move, connect and edit cards. Pan/zoom, undo/redo, snap, themes — no dependencies.</p>' },
    { id: 'a', x: 60, y: 300, width: 250, variant: 'accent', tag: 'Step 1', title: 'Click a card',
      body: 'A click opens the <b>rich-text editor</b> (bold / italic / lists / heading).' },
    { id: 'b', x: 400, y: 300, width: 250, variant: 'accent', tag: 'Step 2', title: 'Connect',
      body: 'Drag a port on the edge → drop on a card, or on empty space to spawn a linked card.' },
    { id: 'c', x: 740, y: 300, width: 250, variant: 'safe', title: 'Restyle',
      body: 'Select a card or connection → the inspector (top-right): colors (hex picker), border, width, style.' },
    { id: 'd', x: 400, y: 540, width: 250, variant: 'muted', title: 'Shift + drag',
      body: 'draws a marquee to select several cards and edit them together.' }
  ];
  var edges = [
    { from: 'a', to: 'b', dir: 'h', arrow: true, label: 'then' },
    { from: 'b', to: 'c', dir: 'h', arrow: true },
    { from: 'b', to: 'd', dir: 'v', arrow: true, style: 'dashed' }
  ];

  var board = new FlowBoard('#app', { theme: 'light', readOnly: true, minimap: true, inspector: true });
  board.setNodes(nodes); board.setEdges(edges); board.fit();

  var ic = FlowBoard.ICON;
  function syncTheme(t) { document.documentElement.setAttribute('data-theme', t); }
  syncTheme(board.getTheme()); board.on('theme', syncTheme);
  function status(t) { document.getElementById('status').textContent = t; }

  document.getElementById('add').innerHTML = ic('plus') + '<span>Card</span>';
  document.getElementById('save').innerHTML = ic('device-floppy') + '<span>Save</span>';
  var ro = true, roBtn = document.getElementById('ro');
  function roLabel() { roBtn.innerHTML = (ro ? ic('pencil') : ic('eye')) + '<span>' + (ro ? 'Edit' : 'Read-only') + '</span>'; }
  roLabel();

  document.getElementById('add').addEventListener('click', function () { var n = board.addNode({ x: 120 + Math.round(Math.random() * 120), y: 560 + Math.round(Math.random() * 60), width: 220, title: 'New card', body: '' }); status('added: ' + n.id); });
  roBtn.addEventListener('click', function () { ro = !ro; board.setReadOnly(ro); roLabel(); status(ro ? 'read-only (presentation)' : 'editable'); });
  document.getElementById('save').addEventListener('click', function () {
    var data = JSON.stringify(board.toJSON());
    var html = '<!doctype html>\n<meta charset="utf-8">\n<title>FlowBoard</title>\n' +
      '<div id="app" style="position:fixed;inset:0"></div>\n' +
      '<script src="' + CDN + '"><\/script>\n' +
      '<script>new FlowBoard("#app",{readOnly:true,theme:"' + board.getTheme() + '"}).fromJSON(' + data + ');<\/script>\n';
    var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' })); a.download = 'flowboard.html'; a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000); status('saved as flowboard.html');
  });
})();
</script>
</body>
</html>
